<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Footage Classification Review</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Newsreader:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #faf9f7;
      color: #2c2c2c;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 340px;
      flex-shrink: 0;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      border-right: 1px solid #e0ddd8;
      background: #f0eeea;
      overflow-y: auto;
    }

    .sidebar h1 {
      font-family: 'Newsreader', Georgia, serif;
      font-size: 22px;
      font-weight: 600;
      color: #1a1a1a;
    }

    .sidebar .subtitle {
      font-size: 12px;
      color: #888;
      margin-top: -8px;
    }

    /* Video player */
    #player {
      width: 100%;
      border-radius: 8px;
      background: #000;
      aspect-ratio: 16/9;
    }

    .player-label {
      font-size: 13px;
      font-weight: 600;
      color: #1a1a1a;
      text-align: center;
    }

    .player-controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .player-controls button {
      padding: 6px 14px;
      background: #3d8c40;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-family: 'Newsreader', Georgia, serif;
      font-weight: 600;
    }
    .player-controls button:hover { background: #357a38; }

    .player-controls select {
      padding: 6px 10px;
      background: #fff;
      color: #2c2c2c;
      border: 1px solid #d0cdc8;
      border-radius: 6px;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
    }

    .player-controls .time-display {
      font-family: 'SF Mono', 'Consolas', monospace;
      font-size: 13px;
      color: #888;
      margin-left: auto;
    }

    /* Summary cards */
    .summary {
      display: flex;
      gap: 8px;
    }

    .summary-card {
      flex: 1;
      background: #fff;
      border: 1px solid #e0ddd8;
      border-radius: 8px;
      padding: 10px;
      text-align: center;
    }
    .summary-card .count {
      font-size: 22px;
      font-weight: 600;
      font-family: 'Newsreader', Georgia, serif;
    }
    .summary-card .label {
      font-size: 10px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .summary-card.a-roll .count { color: #16a34a; }
    .summary-card.b-roll .count { color: #6366f1; }
    .summary-card.review .count { color: #f59e0b; }

    .help {
      font-size: 12px;
      color: #888;
      background: #fff;
      padding: 10px;
      border-radius: 6px;
      line-height: 1.8;
      border: 1px solid #e0ddd8;
    }
    .help b { color: #2c2c2c; }

    .sidebar-buttons {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: auto;
    }

    .sidebar-buttons button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
    }
    .btn-save { background: #2c2c2c; color: #fff; }
    .btn-save:hover { background: #444; }
    .btn-export { background: #16a34a; color: #fff; }
    .btn-export:hover { background: #15803d; }

    /* ── Main panel ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Filter tabs */
    .filters {
      display: flex;
      gap: 8px;
      padding: 14px 24px;
      border-bottom: 1px solid #e0ddd8;
      background: #faf9f7;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-btn {
      padding: 7px 16px;
      border: 1px solid #d0cdc8;
      border-radius: 20px;
      background: #fff;
      cursor: pointer;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      color: #555;
      transition: all 0.15s;
    }
    .filter-btn:hover { border-color: #999; }
    .filter-btn.active { background: #2c2c2c; color: #fff; border-color: #2c2c2c; }

    .filter-count {
      margin-left: auto;
      font-size: 13px;
      color: #888;
    }

    /* Clip list */
    .clip-list {
      flex: 1;
      overflow-y: auto;
      padding: 16px 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .clip-card {
      background: #fff;
      border: 1px solid #e8e5e0;
      border-radius: 10px;
      padding: 14px 18px;
      display: grid;
      grid-template-columns: 160px 1fr auto;
      gap: 14px;
      align-items: center;
      transition: border-color 0.15s, box-shadow 0.15s;
      cursor: pointer;
    }
    .clip-card:hover {
      border-color: #ccc;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .clip-card.active-clip {
      border-color: #4a9eff;
      box-shadow: 0 0 0 2px rgba(74, 158, 255, 0.15);
    }

    .clip-info {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .clip-name {
      font-weight: 600;
      font-size: 14px;
      color: #1a1a1a;
    }
    .clip-meta {
      font-size: 11px;
      color: #999;
    }

    /* Speech density bar */
    .density-bar-container {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
    }
    .density-bar {
      flex: 1;
      height: 5px;
      background: #f0eeea;
      border-radius: 3px;
      overflow: hidden;
      max-width: 80px;
    }
    .density-fill {
      height: 100%;
      border-radius: 3px;
    }
    .density-fill.a-roll { background: #16a34a; }
    .density-fill.b-roll { background: #6366f1; }
    .density-fill.review { background: #f59e0b; }
    .density-label {
      font-size: 11px;
      font-weight: 500;
      color: #888;
    }

    /* Transcript snippet */
    .clip-transcript {
      font-family: 'Newsreader', Georgia, serif;
      font-size: 13px;
      line-height: 1.5;
      color: #555;
      font-style: italic;
    }
    .clip-transcript.empty {
      color: #ccc;
      font-style: normal;
      font-size: 12px;
    }

    /* Classification toggle buttons */
    .clip-actions {
      display: flex;
      gap: 5px;
      flex-direction: column;
    }

    .tag-btn {
      padding: 5px 12px;
      border: 2px solid transparent;
      border-radius: 6px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      transition: all 0.15s;
      background: #f5f4f2;
      color: #999;
      min-width: 80px;
      text-align: center;
    }
    .tag-btn:hover { background: #eee; }
    .tag-btn.a-roll.active { background: #dcfce7; color: #16a34a; border-color: #16a34a; }
    .tag-btn.b-roll.active { background: #e0e7ff; color: #6366f1; border-color: #6366f1; }

    /* Day separator */
    .day-separator {
      font-family: 'Newsreader', Georgia, serif;
      font-size: 14px;
      font-weight: 600;
      color: #888;
      padding: 8px 0 4px;
      border-bottom: 1px solid #e8e5e0;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>

  <!-- ── Sidebar ── -->
  <div class="sidebar">
    <h1>Classification Review</h1>
    <p class="subtitle">Review AI tags, preview clips, override where needed</p>

    <video id="player" preload="auto"></video>
    <div class="player-label" id="playerLabel">No clip selected</div>
    <div class="player-controls">
      <button id="playBtn">▶️ Play</button>
      <select id="speed">
        <option value="0.5">0.5x</option>
        <option value="0.75">0.75x</option>
        <option value="1" selected>1x</option>
        <option value="1.25">1.25x</option>
        <option value="1.5">1.5x</option>
        <option value="2">2x</option>
      </select>
      <span class="time-display" id="time">0:00 / 0:00</span>
    </div>

    <div class="summary" id="summary"></div>

    <div class="help">
      <div><b>🖱️</b> Click card = preview clip</div>
      <div><b>⌨️</b> Space = play/pause | ←→ = skip 2s</div>
      <div><b>🏷️</b> Click A-Roll / B-Roll to override AI tag</div>
    </div>

    <div class="sidebar-buttons">
      <button class="btn-save" id="saveBtn">💾 Save Classifications</button>
      <button class="btn-export" id="exportBtn">📤 Export A-Roll / B-Roll Lists</button>
    </div>
  </div>

  <!-- ── Main panel ── -->
  <div class="main">
    <div class="filters" id="filters">
      <button class="filter-btn active" data-filter="review">🔍 Review Needed</button>
      <button class="filter-btn" data-filter="a-roll">✅ A-Roll</button>
      <button class="filter-btn" data-filter="b-roll">🎬 B-Roll</button>
      <button class="filter-btn" data-filter="all">All</button>
      <span class="filter-count" id="filterCount"></span>
    </div>
    <div class="clip-list" id="clips"></div>
  </div>

<script>
// ── Sample data (mimics classify_result.json) ──
const sampleData = {
  folder: "/Volumes/SSD/012 Seattle Vlog/Media/Vlogs",
  language: "en",
  thresholds: { a_roll: 0.50, b_roll: 0.05 },
  clips: [
    {
      file: "D1/D1-01.mov", duration: 185.4, speech_density: 0.72,
      classification: "a-roll", word_count: 312,
      snippet: "Hey everyone, welcome back to the channel. So today we're going to explore Pike Place Market and I'm really excited because this is my first time here since moving to Seattle..."
    },
    {
      file: "D1/D1-02.mov", duration: 42.8, speech_density: 0.01,
      classification: "b-roll", word_count: 0, snippet: ""
    },
    {
      file: "D1/D1-03.mov", duration: 15.2, speech_density: 0.0,
      classification: "b-roll", word_count: 0, snippet: ""
    },
    {
      file: "D1/D1-04.mov", duration: 8.6, speech_density: 0.38,
      classification: "review", word_count: 8,
      snippet: "Okay so we're heading to the market now"
    },
    {
      file: "D1/D1-05.mov", duration: 67.3, speech_density: 0.0,
      classification: "b-roll", word_count: 0, snippet: ""
    },
    {
      file: "D1/D1-06.mov", duration: 22.1, speech_density: 0.12,
      classification: "review", word_count: 6,
      snippet: "Look at this fish they just threw"
    },
    {
      file: "D1/D1-07.mov", duration: 210.6, speech_density: 0.81,
      classification: "a-roll", word_count: 402,
      snippet: "So I just tried the clam chowder from Pike Place Chowder and honestly it might be the best chowder I've ever had. The bread bowl was so fresh and the chowder itself was super creamy..."
    },
    {
      file: "D1/D1-08.mov", duration: 31.4, speech_density: 0.0,
      classification: "b-roll", word_count: 0, snippet: ""
    },
    {
      file: "D1/D1-09.mov", duration: 5.2, speech_density: 0.42,
      classification: "review", word_count: 5,
      snippet: "This view is absolutely insane"
    },
    {
      file: "D1/D1-10.mov", duration: 95.7, speech_density: 0.65,
      classification: "a-roll", word_count: 148,
      snippet: "Alright so we just got back from the market and I want to talk about something that happened. So basically there was this street performer who was doing the most incredible magic tricks..."
    },
    {
      file: "D2/D2-01.mov", duration: 12.3, speech_density: 0.0,
      classification: "b-roll", word_count: 0, snippet: ""
    },
    {
      file: "D2/D2-02.mov", duration: 145.2, speech_density: 0.78,
      classification: "a-roll", word_count: 267,
      snippet: "Good morning everyone, day two in Seattle. Today's plan is to check out the Museum of Pop Culture which I've been wanting to visit forever. I heard they have an amazing Nirvana exhibit..."
    },
    {
      file: "D2/D2-03.mov", duration: 18.9, speech_density: 0.08,
      classification: "review", word_count: 4,
      snippet: "Oh my god look at this"
    },
    {
      file: "D2/D2-04.mov", duration: 55.0, speech_density: 0.0,
      classification: "b-roll", word_count: 0, snippet: ""
    },
    {
      file: "D2/D2-05.mov", duration: 7.4, speech_density: 0.31,
      classification: "review", word_count: 6,
      snippet: "I can't believe we found this spot"
    },
    {
      file: "D2/D2-06.mov", duration: 178.3, speech_density: 0.69,
      classification: "a-roll", word_count: 289,
      snippet: "So the museum was incredible. I think my favorite part was definitely the sci-fi exhibit. They had actual props from Blade Runner and the original Star Trek and I was just geeking out..."
    },
  ]
};

// ── State ──
let clips = sampleData.clips.map(c => ({ ...c, override: null }));
let activeFilter = 'review';
let activeClipIdx = -1;

// ── Mock video player (static demo — no actual video files) ──
const player = document.getElementById('player');
let mockTime = 0, mockDuration = 0, mockPlaying = false, mockInterval = null;

function loadClipVideo(idx) {
  activeClipIdx = idx;
  const clip = clips[idx];
  mockTime = 0;
  mockDuration = clip.duration;
  mockPlaying = false;
  clearInterval(mockInterval);

  document.getElementById('playerLabel').textContent = clip.file;
  updateTimeDisplay();
  renderClips(); // re-render to show active highlight
}

function togglePlay() {
  if (activeClipIdx < 0) return;
  mockPlaying = !mockPlaying;
  if (mockPlaying) {
    mockInterval = setInterval(() => {
      mockTime += 0.1;
      if (mockTime >= mockDuration) {
        mockTime = mockDuration;
        mockPlaying = false;
        clearInterval(mockInterval);
      }
      updateTimeDisplay();
    }, 100);
  } else {
    clearInterval(mockInterval);
  }
}

function seekBy(sec) {
  mockTime = Math.max(0, Math.min(mockTime + sec, mockDuration));
  updateTimeDisplay();
}

function updateTimeDisplay() {
  document.getElementById('time').textContent =
    formatTimeShort(mockTime) + ' / ' + formatTimeShort(mockDuration);
}

function formatTimeShort(sec) {
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return m + ':' + String(s).padStart(2, '0');
}

// Player controls
document.getElementById('playBtn').onclick = togglePlay;
document.getElementById('speed').onchange = function() { /* mock — no-op in demo */ };

// Keyboard
document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  else if (e.code === 'ArrowLeft') { seekBy(e.shiftKey ? -5 : -2); }
  else if (e.code === 'ArrowRight') { seekBy(e.shiftKey ? 5 : 2); }
});

// ── Helpers ──
function getEffectiveClass(clip) {
  return clip.override || clip.classification;
}

function formatDuration(sec) {
  if (sec >= 60) {
    const m = Math.floor(sec / 60);
    const s = Math.round(sec % 60);
    return m + 'm ' + s + 's';
  }
  return sec.toFixed(1) + 's';
}

function getDayFromFile(file) {
  const m = file.match(/D(\d+)/);
  return m ? 'D' + m[1] : null;
}

// ── Render ──
function renderSummary() {
  const counts = { 'a-roll': 0, 'b-roll': 0, 'review': 0 };
  const durations = { 'a-roll': 0, 'b-roll': 0, 'review': 0 };
  clips.forEach(c => {
    const cls = getEffectiveClass(c);
    counts[cls]++;
    durations[cls] += c.duration;
  });

  document.getElementById('summary').innerHTML =
    '<div class="summary-card a-roll">' +
      '<div class="count">' + counts['a-roll'] + '</div>' +
      '<div class="label">A-Roll · ' + formatDuration(durations['a-roll']) + '</div>' +
    '</div>' +
    '<div class="summary-card b-roll">' +
      '<div class="count">' + counts['b-roll'] + '</div>' +
      '<div class="label">B-Roll · ' + formatDuration(durations['b-roll']) + '</div>' +
    '</div>' +
    '<div class="summary-card review">' +
      '<div class="count">' + counts['review'] + '</div>' +
      '<div class="label">Review · ' + formatDuration(durations['review']) + '</div>' +
    '</div>';
}

function renderClips() {
  const container = document.getElementById('clips');
  container.innerHTML = '';

  const visible = clips.map((c, i) => ({ ...c, _idx: i })).filter(c => {
    if (activeFilter === 'all') return true;
    return getEffectiveClass(c) === activeFilter;
  });

  // Update filter count
  document.getElementById('filterCount').textContent =
    visible.length + ' of ' + clips.length + ' clips';

  if (visible.length === 0) {
    container.innerHTML = '<p style="text-align:center;color:#999;padding:40px;font-style:italic;">No clips in this category.</p>';
    return;
  }

  let lastDay = null;
  visible.forEach(clip => {
    const cls = getEffectiveClass(clip);
    const densityPct = (clip.speech_density * 100).toFixed(1);
    const day = getDayFromFile(clip.file);

    // Day separator
    if (day && day !== lastDay) {
      lastDay = day;
      const sep = document.createElement('div');
      sep.className = 'day-separator';
      sep.textContent = '📅 ' + day;
      container.appendChild(sep);
    }

    const card = document.createElement('div');
    card.className = 'clip-card' + (clip._idx === activeClipIdx ? ' active-clip' : '');
    card.innerHTML =
      '<div class="clip-info">' +
        '<div class="clip-name">' + clip.file.split('/').pop() + '</div>' +
        '<div class="clip-meta">' + formatDuration(clip.duration) + ' · ' + clip.word_count + ' words</div>' +
        '<div class="density-bar-container">' +
          '<div class="density-bar">' +
            '<div class="density-fill ' + cls + '" style="width:' + Math.min(parseFloat(densityPct), 100) + '%"></div>' +
          '</div>' +
          '<span class="density-label">' + densityPct + '% speech</span>' +
        '</div>' +
      '</div>' +
      '<div class="clip-transcript ' + (clip.snippet ? '' : 'empty') + '">' +
        (clip.snippet ? '"' + clip.snippet + '"' : '(no speech detected)') +
      '</div>' +
      '<div class="clip-actions">' +
        '<button class="tag-btn a-roll ' + (cls === 'a-roll' ? 'active' : '') + '" data-idx="' + clip._idx + '" data-tag="a-roll">A-Roll</button>' +
        '<button class="tag-btn b-roll ' + (cls === 'b-roll' ? 'active' : '') + '" data-idx="' + clip._idx + '" data-tag="b-roll">B-Roll</button>' +
      '</div>';

    // Click card body to preview video
    card.addEventListener('click', e => {
      if (e.target.closest('.tag-btn')) return; // don't trigger on tag buttons
      loadClipVideo(clip._idx);
    });

    container.appendChild(card);
  });
}

function render() {
  renderSummary();
  renderClips();
}

// ── Events ──
document.getElementById('clips').addEventListener('click', e => {
  const btn = e.target.closest('.tag-btn');
  if (!btn) return;

  const idx = parseInt(btn.dataset.idx);
  const tag = btn.dataset.tag;
  const clip = clips[idx];

  // Toggle: if already this tag, revert to AI classification
  if (getEffectiveClass(clip) === tag) {
    clip.override = clip.classification === tag ? null : clip.classification;
  } else {
    clip.override = tag;
  }

  render();
});

document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;

  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = btn.dataset.filter;
  renderClips();
});

document.getElementById('saveBtn').addEventListener('click', () => {
  const result = clips.map(c => ({
    file: c.file,
    ai_classification: c.classification,
    final_classification: getEffectiveClass(c),
    overridden: c.override !== null,
  }));
  console.log('Save payload:', JSON.stringify(result, null, 2));
  alert('💾 Saved ' + result.length + ' classifications.\n\n(Static demo — check console for payload.)');
});

document.getElementById('exportBtn').addEventListener('click', () => {
  const aRolls = clips.filter(c => getEffectiveClass(c) === 'a-roll').map(c => c.file);
  const bRolls = clips.filter(c => getEffectiveClass(c) === 'b-roll').map(c => c.file);
  const reviews = clips.filter(c => getEffectiveClass(c) === 'review').map(c => c.file);

  let msg = '📤 Export Summary\n\n' +
    'A-Roll: ' + aRolls.length + ' clips (' + formatDuration(clips.filter(c => getEffectiveClass(c) === 'a-roll').reduce((s,c) => s + c.duration, 0)) + ')\n' +
    'B-Roll: ' + bRolls.length + ' clips (' + formatDuration(clips.filter(c => getEffectiveClass(c) === 'b-roll').reduce((s,c) => s + c.duration, 0)) + ')';

  if (reviews.length > 0) {
    msg += '\n\n⚠️ ' + reviews.length + ' clips still unresolved:\n  ' + reviews.map(f => f.split('/').pop()).join(', ');
  } else {
    msg += '\n\n✅ All clips classified!';
  }

  msg += '\n\n(Static demo — check console for full export data)';

  console.log('Export:', JSON.stringify({ a_rolls: aRolls, b_rolls: bRolls, unresolved: reviews }, null, 2));
  alert(msg);
});

// ── Init ──
render();
</script>
</body>
</html>
