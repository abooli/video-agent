<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rough Cut Review — __BATCH_NAME__</title>
  <script src="https://unpkg.com/wavesurfer.js@7"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #1a1a1a; color: #e0e0e0; display: flex; height: 100vh;
    }
    .sidebar {
      width: 220px; background: #141414; border-right: 1px solid #333;
      padding: 20px 16px; flex-shrink: 0; display: flex; flex-direction: column;
    }
    .sidebar h1 { font-size: 13px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; }
    .tab-btn {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; padding: 10px 12px; margin-bottom: 4px;
      background: transparent; border: 1px solid transparent; border-radius: 6px;
      color: #ccc; font-size: 14px; cursor: pointer; text-align: left;
    }
    .tab-btn:hover { background: #1a1a2e; }
    .tab-btn.active { background: #0f3460; border-color: #4a9eff; color: #fff; }
    .tab-btn .badge { font-size: 11px; background: #ff9800; color: #000; padding: 2px 6px; border-radius: 10px; font-weight: 600; }
    .tab-btn.active .badge { background: #4a9eff; color: #fff; }
    .sidebar-spacer { flex: 1; }
    .cut-all-btn {
      width: 100%; padding: 12px; background: #9C27B0; color: #fff;
      border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; margin-top: 12px;
    }
    .cut-all-btn:hover { background: #7B1FA2; }
    .main { flex: 1; overflow-y: auto; padding: 24px; max-width: 900px; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .controls { position: sticky; top: 0; background: #1a1a1a; padding: 15px 0; border-bottom: 1px solid #333; z-index: 100; }
    .buttons { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 15px; }
    button { padding: 8px 16px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
    button:hover { background: #45a049; }
    button.danger { background: #f44336; }
    button.danger:hover { background: #da190b; }
    select { padding: 8px 12px; background: #333; color: white; border: none; border-radius: 4px; font-size: 14px; }
    .time-display { font-family: monospace; font-size: 16px; color: #888; }
    .waveform-container { background: #252525; border-radius: 4px; margin: 10px 0; height: 80px; }
    .help { font-size: 13px; color: #999; margin-top: 10px; background: #252525; padding: 12px; border-radius: 6px; line-height: 1.8; }
    .help b { color: #fff; }
    .content { line-height: 2.5; padding: 20px 0; }
    .word { display: inline-block; padding: 4px 2px; margin: 2px; border-radius: 3px; cursor: pointer; transition: all 0.15s; }
    .word:hover { background: #333; }
    .word.current { background: #2196F3; color: white; }
    .word.selected { background: #f44336; color: white; text-decoration: line-through; }
    .word.ai-selected { background: #ff9800; color: white; }
    .word.ai-selected.selected { background: #f44336; }
    .gap { display: inline-block; background: #333; color: #888; padding: 4px 8px; margin: 2px; border-radius: 3px; font-size: 12px; cursor: pointer; }
    .gap:hover { background: #444; }
    .gap.selected { background: #f44336; color: white; }
    .gap.ai-selected { background: #ff9800; color: white; }
    .gap.ai-selected.selected { background: #f44336; }
    .stats { margin-top: 10px; padding: 10px; background: #252525; border-radius: 4px; font-size: 14px; }
    .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; }
    .loading-overlay.show { display: flex; }
    .loading-spinner { width: 60px; height: 60px; border: 4px solid #333; border-top-color: #9C27B0; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { margin-top: 20px; font-size: 18px; color: #fff; }
    .loading-progress-container { margin-top: 20px; width: 300px; height: 8px; background: #333; border-radius: 4px; overflow: hidden; }
    .loading-progress-bar { height: 100%; background: linear-gradient(90deg, #9C27B0, #E91E63); width: 0%; transition: width 0.3s ease; }
    .loading-time { margin-top: 15px; font-size: 14px; color: #888; }
  </style>
</head>
<body>
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">🎬 Cutting...</div>
    <div class="loading-progress-container"><div class="loading-progress-bar" id="loadingProgress"></div></div>
    <div class="loading-time" id="loadingTime">Elapsed: 0s</div>
  </div>
  <div class="sidebar">
    <h1>__BATCH_NAME__</h1>
<!--__TAB_BUTTONS__-->
    <div class="sidebar-spacer"></div>
    <button class="cut-all-btn" id="cutAllBtn">✂️ Cut All Clips</button>
  </div>
  <div class="main">
<!--__TAB_PANELS__-->
  </div>
  <script>
    /*__CLIP_DATA__*/

    var clipState = {};
    var activeClip = CLIPS[0];

    CLIPS.forEach(function(clip, idx) {
      var words = CLIP_WORDS[clip];
      var autoSelected = new Set(CLIP_AUTO[clip]);
      var ws = WaveSurfer.create({
        container: '#waveform-' + clip,
        waveColor: '#4a9eff', progressColor: '#1976D2', cursorColor: '#fff',
        height: 80, barWidth: 2, barGap: 1, barRadius: 2,
        url: '/audio/' + clip + '_audio.m4a'
      });
      clipState[clip] = {
        words: words, autoSelected: autoSelected,
        selected: new Set(autoSelected), elements: [],
        wavesurfer: ws, _selecting: false, _selectStart: -1, _selectMode: 'add'
      };
      ws.on('timeupdate', function(t) {
        var state = clipState[clip];
        if (ws.isPlaying()) {
          var sorted = Array.from(state.selected).sort(function(a,b){return a-b;});
          for (var si = 0; si < sorted.length; si++) {
            var w = state.words[sorted[si]];
            if (t >= w.start && t < w.end) {
              var endTime = w.end, j = si + 1;
              while (j < sorted.length) {
                var nw = state.words[sorted[j]];
                if (nw.start - endTime < 0.1) { endTime = nw.end; j++; } else break;
              }
              ws.setTime(endTime); return;
            }
          }
        }
        document.getElementById('time-' + clip).textContent = formatTime(t) + ' / ' + formatTime(ws.getDuration());
        state.elements.forEach(function(el, i) {
          var w = state.words[i];
          if (t >= w.start && t < w.end) {
            if (!el.classList.contains('current')) { el.classList.add('current'); el.scrollIntoView({behavior:'smooth',block:'center'}); }
          } else { el.classList.remove('current'); }
        });
      });
      renderClip(clip);
    });

    // Tab switching
    document.querySelectorAll('.tab-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
        document.querySelectorAll('.tab-panel').forEach(function(p){p.classList.remove('active');});
        btn.classList.add('active');
        document.getElementById('panel-' + btn.dataset.clip).classList.add('active');
        activeClip = btn.dataset.clip;
      });
    });

    function formatTime(sec) {
      var m = Math.floor(sec/60), s = Math.floor(sec%60);
      return m.toString().padStart(2,'0') + ':' + s.toString().padStart(2,'0');
    }

    function renderClip(clip) {
      var state = clipState[clip];
      var container = document.getElementById('content-' + clip);
      container.innerHTML = ''; state.elements = [];
      state.words.forEach(function(word, i) {
        var div = document.createElement('div');
        div.className = word.isGap ? 'gap' : 'word';
        if (state.selected.has(i)) div.classList.add('selected');
        else if (state.autoSelected.has(i)) div.classList.add('ai-selected');
        div.textContent = word.isGap ? ('⏸ ' + (word.end - word.start).toFixed(1) + 's') : word.text;
        div.dataset.index = i; div.dataset.clip = clip;
        div.onclick = function() { if (!state._selecting) state.wavesurfer.setTime(word.start); };
        div.ondblclick = function() { toggleWord(clip, i); };
        div.onmousedown = function(e) {
          if (e.shiftKey) { state._selecting = true; state._selectStart = i; state._selectMode = state.selected.has(i) ? 'remove' : 'add'; e.preventDefault(); }
        };
        container.appendChild(div); state.elements.push(div);
      });
      updateStats(clip);
    }

    function toggleWord(clip, i) {
      var state = clipState[clip];
      if (state.selected.has(i)) {
        state.selected.delete(i); state.elements[i].classList.remove('selected');
        if (state.autoSelected.has(i)) state.elements[i].classList.add('ai-selected');
      } else {
        state.selected.add(i); state.elements[i].classList.add('selected'); state.elements[i].classList.remove('ai-selected');
      }
      updateStats(clip); updateBadge(clip);
    }

    function updateStats(clip) {
      var state = clipState[clip], dur = 0;
      state.selected.forEach(function(i) { dur += state.words[i].end - state.words[i].start; });
      document.getElementById('stats-' + clip).textContent = 'Selected: ' + state.selected.size + ' segments, total: ' + dur.toFixed(2) + 's';
    }
    function updateBadge(clip) {
      var btn = document.querySelector('.tab-btn[data-clip="' + clip + '"] .badge');
      if (btn) btn.textContent = clipState[clip].selected.size;
    }

    // Shift+drag multi-select
    document.addEventListener('mousemove', function(e) {
      var target = e.target.closest('[data-index]');
      if (!target) return;
      var clip = target.dataset.clip, state = clipState[clip];
      if (!state._selecting) return;
      var i = parseInt(target.dataset.index);
      var min = Math.min(state._selectStart, i), max = Math.max(state._selectStart, i);
      for (var j = min; j <= max; j++) {
        if (state._selectMode === 'add') {
          state.selected.add(j); state.elements[j].classList.add('selected'); state.elements[j].classList.remove('ai-selected');
        } else {
          state.selected.delete(j); state.elements[j].classList.remove('selected');
          if (state.autoSelected.has(j)) state.elements[j].classList.add('ai-selected');
        }
      }
      updateStats(clip); updateBadge(clip);
    });
    document.addEventListener('mouseup', function() { CLIPS.forEach(function(c){clipState[c]._selecting=false;}); });

    // Button handlers
    document.querySelectorAll('.play-pause-btn').forEach(function(btn) {
      btn.onclick = function() { clipState[btn.dataset.clip].wavesurfer.playPause(); };
    });
    document.querySelectorAll('.speed-select').forEach(function(sel) {
      sel.onchange = function() { clipState[sel.dataset.clip].wavesurfer.setPlaybackRate(parseFloat(sel.value)); };
    });
    document.querySelectorAll('.clear-btn').forEach(function(btn) {
      btn.onclick = function() {
        var state = clipState[btn.dataset.clip]; state.selected.clear();
        state.elements.forEach(function(el, i) { el.classList.remove('selected'); if (state.autoSelected.has(i)) el.classList.add('ai-selected'); });
        updateStats(btn.dataset.clip); updateBadge(btn.dataset.clip);
      };
    });
    document.querySelectorAll('.copy-btn').forEach(function(btn) {
      btn.onclick = function() {
        var state = clipState[btn.dataset.clip], segs = [];
        Array.from(state.selected).sort(function(a,b){return a-b;}).forEach(function(i) { segs.push({start:state.words[i].start, end:state.words[i].end}); });
        var merged = [];
        segs.forEach(function(seg) {
          if (!merged.length) { merged.push({start:seg.start,end:seg.end}); }
          else { var last = merged[merged.length-1]; if (Math.abs(seg.start-last.end)<0.05) last.end=seg.end; else merged.push({start:seg.start,end:seg.end}); }
        });
        navigator.clipboard.writeText(JSON.stringify(merged,null,2)).then(function(){alert('Copied '+merged.length+' segments');});
      };
    });

    // Cut single clip
    document.querySelectorAll('.cut-btn').forEach(function(btn) {
      btn.onclick = function() {
        var clip = btn.dataset.clip, state = clipState[clip];
        var dur = state.wavesurfer.getDuration(), estSec = Math.max(5, Math.ceil(dur/4));
        if (!confirm('Cut ' + clip + '?\n\nEstimated: ~' + estSec + 's')) return;
        var selected = Array.from(state.selected).sort(function(a,b){return a-b;});
        showLoading(estSec);
        fetch('/cut/' + clip, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({selected:selected}) })
        .then(function(r){return r.json();})
        .then(function(data) { hideLoading(); alert(data.ok ? '✅ '+clip+' cut → '+data.output : '❌ '+data.error); })
        .catch(function(err) { hideLoading(); alert('❌ '+err.message); });
      };
    });

    // Cut all
    document.getElementById('cutAllBtn').onclick = function() {
      var summary = CLIPS.map(function(c){return c+': '+clipState[c].selected.size+' segments';}).join('\n');
      if (!confirm('Cut all clips?\n\n'+summary)) return;
      var payload = {};
      CLIPS.forEach(function(c) { payload[c] = Array.from(clipState[c].selected).sort(function(a,b){return a-b;}); });
      showLoading(30);
      fetch('/cut-all', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) })
      .then(function(r){return r.json();})
      .then(function(data) {
        hideLoading();
        if (data.ok) alert('✅ All clips cut!');
        else { var msgs = Object.entries(data.results).map(function(e){return e[0]+': '+(e[1].ok?'✅':'❌ '+e[1].error);}); alert(msgs.join('\n')); }
      })
      .catch(function(err) { hideLoading(); alert('❌ '+err.message); });
    };

    // Loading overlay helpers
    var _loadingTimer = null;
    function showLoading(estSec) {
      var overlay = document.getElementById('loadingOverlay');
      overlay.classList.add('show');
      var start = Date.now();
      _loadingTimer = setInterval(function() {
        var elapsed = Math.floor((Date.now()-start)/1000);
        document.getElementById('loadingTime').textContent = 'Elapsed: '+elapsed+'s';
        document.getElementById('loadingProgress').style.width = Math.min(95, (elapsed/estSec)*100)+'%';
      }, 500);
    }
    function hideLoading() {
      clearInterval(_loadingTimer);
      var overlay = document.getElementById('loadingOverlay');
      document.getElementById('loadingProgress').style.width = '100%';
      setTimeout(function(){ overlay.classList.remove('show'); document.getElementById('loadingProgress').style.width='0%'; }, 300);
    }

    // Keyboard shortcuts
    document.addEventListener('keydown', function(e) {
      if (e.code === 'Space') { e.preventDefault(); clipState[activeClip].wavesurfer.playPause(); }
      else if (e.code === 'ArrowLeft') { var ws = clipState[activeClip].wavesurfer; ws.setTime(Math.max(0, ws.getCurrentTime()-(e.shiftKey?5:1))); }
      else if (e.code === 'ArrowRight') { var ws = clipState[activeClip].wavesurfer; ws.setTime(ws.getCurrentTime()+(e.shiftKey?5:1)); }
    });
  </script>
</body>
</html>
